version: 1

# Interim dogfood paper (design §12 step 0, adapted from engine test/fixture-paper). This
# is a NEW-MODEL committed paper: NO `extends:` (compose injects the engine/edition/brand
# chain), and the single engine coordinate rides myst's `options` passthrough ([R36]). It
# deliberately also carries a sibling option (`youtube`) so a real fixture build proves
# compose/schema never clobber option keys the engine doesn't own (finding 3 / [R49]).
project:
  # id: satisfies the instance's id_pattern `^fixture-\d{4}-[a-z0-9-]+$` and is NOT the
  # id_sentinel `fixture-template-placeholder` — so `oak validate` accepts it ([R12], [R47]).
  id: fixture-template-placeholder
  title: An Interim Dogfood Paper for the Engine Shim
  date: 2026-07-09
  authors:
    - name: Ada Fixture
      orcid: 0000-0002-1825-0097
      affiliations:
        - Fixture Institute
      corresponding: true
      email: ada@example.org
      roles:
        - conceptualization
        - software
        - writing - original draft
  keywords:
    - fixtures
    - engine
  bibliography:
    - bib.bib
  options:
    youtube: https://youtu.be/dQw4w9WgXcQ
    oaktree-sapling:
      # A runnable engine ⟺ a release ([R57]): CI runs released tags only, never a branch tip.
      # Interim pins a dev pre-release (accumulate + prune, ../engine/RELEASING.md); becomes a
      # real `vX.Y.Z` on canonical. A non-release pin fails loud in the shim (`pin a release`).
      version: v0.0.0-dev.12
      edition: fixture-edition
  doi: 10.5072/zenodo.562233
  github: https://github.com/pollomarzo/fixture-paper-repo
